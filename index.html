<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazzo NFC Interattivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f4f4;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Almendra', serif; 
            background-image: url('https://as1.ftcdn.net/v2/jpg/09/73/57/52/1000_F_973575228_DO8x9FCFBaZpL1aXbZe13M7tvDEysStU.jpg');
            background-color: #332211;
            background-size: cover;
            background-position: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        button, p, h1, h2, h3, .status-msg {
            font-family: 'Almendra', serif;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #start-screen h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        #game-container {
            width: 90vw;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            perspective: 1000px;
            display: none;
        }

        #reset-btn {
            position: absolute;
            top: 20px; right: 20px;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.9rem;
        }

        .card-display {
            width: 100%;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            color: #2c3e50;
            /* Protezione anti-flash */
            backface-visibility: hidden;
            -webkit-perspective: 1000;
        }

        .card-img {
            width: 100%;
            height: auto;
            max-height: 55vh;
            display: block;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .status-msg {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: bold;
        }

        .hidden { display: none !important; }

        #scanning-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; justify-content: center; align-items: center;
            border-radius: 15px;
            z-index: 10;
        }

        #card-name {
            margin: 0 0 5px 0;
            font-size: 2rem;
            color: #c0392b;
        }

        #card-desc {
            font-size: 1.2rem;
            margin-top: 5px;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: #f4e7d3;
            padding: 30px;
            border-radius: 10px;
            border: 3px solid var(--gold);
            max-width: 85%;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            color: #332211;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .modal-buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-annulla { background: #95a5a6; color: white; }
        .btn-conferma { background: #c0392b; color: white; }

    </style>
</head>
<body>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Reset del Mazzo</h2>
            <p>Sei sicuro di voler rimettere tutti i tesori nel forziere e ricominciare?</p>
            <div class="modal-buttons">
                <button onclick="chiudiModal()" class="btn-annulla">ANNULLA</button>
                <button onclick="eseguiReset()" class="btn-conferma">RIPRISTINA</button>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <h1>Nuovi tesori ti aspettano</h1>
        <p style="margin-bottom: 30px; font-size: 1.3rem;">Pronto per l'avventura?</p>
        <button id="start-btn" onclick="iniziaAvventura()" style="padding:20px 40px; font-size:1.4rem; font-weight:bold; cursor:pointer; background: #c0392b; color:white; border:none; border-radius:50px;">INIZIA A CERCARE</button>
    </div>

    <button id="reset-btn" onclick="confermaReset()">Ripristina Tesori</button>

    <div id="game-container">
        <div id="deck-back" class="card-display" onclick="estrai()">
            <img src="https://hqtoolkit.altervista.org/images/tesori/HQ21/HQ21_back.png" alt="Retro Mazzo" class="card-img">
            <p style="font-size: 1.2rem;">Avvicinati al forziere per cercare tesori</p>
        </div>

        <div id="scanning-overlay" class="hidden">
            <p class="status-msg">In cerca di tesori...</p>
        </div>

        <div id="card-front" class="card-display hidden">
            <h2 id="card-name">Nome Carta</h2>
            <img id="card-image" src="" alt="Immagine Carta" class="card-img">
            <p id="card-desc">Descrizione della carta estratta.</p>
        </div>
    </div>

    <script>

            {id: 2, nome: "Pozione Risanante", tipo: "Tesori", desc: "In a bundle of rags, you find a small bottle of bluish liquid. You can drink this healing potion at any time, restoring the number of Body Points equal to a roll of one die. You cannot, however, exceed your starting number of Body Points. This may only be used once.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c4/Potion_healing.jpg/revision/latest?cb=20090514123902"},
            {id: 3, nome: "Pozione Risanante", tipo: "Tesori", desc: "In a bundle of rags, you find a small bottle of bluish liquid. You can drink this healing potion at any time, restoring the number of Body Points equal to a roll of one die. You cannot, however, exceed your starting number of Body Points. This may only be used once.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c4/Potion_healing.jpg/revision/latest?cb=20090514123902"},
            {id: 4, nome: "Pozione Eroica", tipo: "Tesori", desc: "You are surprised to find a leather bag hanging on the wall. If you drink its contents before you attack, you can make two attacks instead of one. This may only be used once.", img: "https://static.wikia.nocookie.net/heroquest/images/9/92/Potion_heroic.jpg/revision/latest?cb=20090514125219"},
            {id: 5, nome: "Pozione Rinforzante", tipo: "Tesori", desc: "You find a small purple flask. You can drink this strange smelling liquid at any time, enabling you to roll two extra combat dice the next time you attack. This may only be used once.", img: "https://static.wikia.nocookie.net/heroquest/images/a/a8/Potion_strength.jpg/revision/latest?cb=20090514125250"},
            {id: 6, nome: "Pozione di Difesa", tipo: "Tesori", desc: "Amidst a collection of old bottles, you find a small vial containing clear liquid. You can drink this potion at any time, giving you two extra combat dice next time you defend. This may only be used once.", img: "https://static.wikia.nocookie.net/heroquest/images/a/ae/Potion_defense.jpg/revision/latest?cb=20090514123841"},
            {id: 7, nome: "Gemme!", tipo: "Tesori", desc: "Tucked into the toe of a old boot you find a small gem worth 35 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/8/81/Treasure_gem.jpg/revision/latest?cb=20090514125416"},
            {id: 8, nome: "Gemme!", tipo: "Tesori", desc: "Tucked into the toe of a old boot you find a small gem worth 35 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/8/81/Treasure_gem.jpg/revision/latest?cb=20090514125416"},
            {id: 9, nome: "Oro!", tipo: "Tesori", desc: "You find a loose stone and tear it from the wall. Behind it you discover a small leather pouch wrapped in an old rag. Peering inside, you find 25 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457"},
            {id: 10, nome: "Oro!", tipo: "Tesori", desc: "You find a loose stone and tear it from the wall. Behind it you discover a small leather pouch wrapped in an old rag. Peering inside, you find 25 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457"},
            {id: 11, nome: "Oro!", tipo: "Tesori", desc: "You find a loose stone and tear it from the wall. Behind it you discover a small leather pouch wrapped in an old rag. Peering inside, you find 25 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457"},
            {id: 12, nome: "Oro!", tipo: "Tesori", desc: "You find a loose stone and tear it from the wall. Behind it you discover a small leather pouch wrapped in an old rag. Peering inside, you find 25 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457"},
            {id: 13, nome: "Gioielli!", tipo: "Tesori", desc: "You find a small wooden box. It is simple-looking and very old. Within you discover that it is lined with velvet and contains very small jewels worth 50 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/1/1d/Treasure_jewel.jpg/revision/latest?cb=20090514125520"},
            {id: 14, nome: "Gioielli!", tipo: "Tesori", desc: "You find a small wooden box. It is simple-looking and very old. Within you discover that it is lined with velvet and contains very small jewels worth 50 gold coins. Record the money on your sheet.", img: "https://static.wikia.nocookie.net/heroquest/images/1/1d/Treasure_jewel.jpg/revision/latest?cb=20090514125520"},
            {id: 15, nome: "Mostro Errante", tipo: "Danni", desc: "As you are searching, a monster stalks you and attacks! Place the wandering monster on any square next to you. The monster attacks immediately!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 16, nome: "Mostro Errante", tipo: "Danni", desc: "As you are searching, a monster stalks you and attacks! Place the wandering monster on any square next to you. The monster attacks immediately!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 17, nome: "Mostro Errante", tipo: "Danni", desc: "As you are searching, a monster stalks you and attacks! Place the wandering monster on any square next to you. The monster attacks immediately!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 18, nome: "Mostro Errante", tipo: "Danni", desc: "As you are searching, a monster stalks you and attacks! Place the wandering monster on any square next to you. The monster attacks immediately!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 19, nome: "Mostro Errante", tipo: "Danni", desc: "As you are searching, a monster stalks you and attacks! Place the wandering monster on any square next to you. The monster attacks immediately!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 20, nome: "Mostro Errante", tipo: "Danni", desc: "As you are searching, a monster stalks you and attacks! Place the wandering monster on any square next to you. The monster attacks immediately!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 21, nome: "Trappola!", tipo: "Danni", desc: "While you are searching, a hidden arrow shoots from the wall striking you. You lose 1 Body Point and your turn is over.", img: "https://static.wikia.nocookie.net/heroquest/images/9/91/Hazard_spear.jpg/revision/latest?cb=20090514123733"},
            {id: 22, nome: "Trappola!", tipo: "Danni", desc: "While you are searching, a hidden arrow shoots from the wall striking you. You lose 1 Body Point and your turn is over.", img: "https://static.wikia.nocookie.net/heroquest/images/9/91/Hazard_spear.jpg/revision/latest?cb=20090514123733"},
            {id: 23, nome: "Trabocchetto!", tipo: "Danni", desc: "Suddenly, the stone beneath your feet gives way. You fall into a shallow hole, losing 1 Body Point and ending your turn. You may climb out and move normally on your next turn.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c5/Hazard_pit.jpg/revision/latest?cb=20090514123652"},
            {id: 24, nome: "Trabocchetto!", tipo: "Danni", desc: "Suddenly, the stone beneath your feet gives way. You fall into a shallow hole, losing 1 Body Point and ending your turn. You may climb out and move normally on your next turn.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c5/Hazard_pit.jpg/revision/latest?cb=20090514123652"}
        ];

        let mazzoAttivo = [];
        let isProcessing = false;

        function iniziaAvventura() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            const salvataggio = localStorage.getItem('mazzoNFC');
            mazzoAttivo = salvataggio ? JSON.parse(salvataggio) : [...DATABASE_INIZIALE];
            startNFC();
        }

        function estrai() {
            if (isProcessing || mazzoAttivo.length === 0) return;
            
            isProcessing = true;
            document.getElementById('scanning-overlay').classList.remove('hidden');

            // 1. SCEGLIAMO SUBITO LA CARTA
            const indice = Math.floor(Math.random() * mazzoAttivo.length);
            const carta = mazzoAttivo[indice];

            // 2. PRE-CARICAMENTO DELL'IMMAGINE (FORZA IL DOWNLOAD ORA)
            const imgPreload = new Image();
            imgPreload.src = carta.img;

            // 3. ASPETTIAMO I 3 SECONDI DI RICERCA
            imgPreload.onload = imgPreload.onerror = function() {
                // L'immagine è pronta (o il link è rotto, ma procediamo comunque)
                setTimeout(() => {
                    // Aggiorniamo i dati mentre l'overlay è ancora attivo
                    document.getElementById('card-name').innerText = carta.nome;
                    document.getElementById('card-image').src = carta.img;
                    document.getElementById('card-desc').innerText = carta.desc;

                    // SCAMBIO VISIVO COORDINATO
                    document.getElementById('card-front').classList.remove('hidden');
                    document.getElementById('scanning-overlay').classList.add('hidden');
                    document.getElementById('deck-back').classList.add('hidden');

                    if (carta.tipo === "Tesori") {
                        mazzoAttivo.splice(indice, 1);
                        localStorage.setItem('mazzoNFC', JSON.stringify(mazzoAttivo));
                    }

                    setTimeout(() => {
                        document.getElementById('card-front').classList.add('hidden');
                        document.getElementById('deck-back').classList.remove('hidden');
                        isProcessing = false;
                    }, 10000); 
                }, 3000);
            };
            
            // Fail-safe: se l'immagine ci mette troppo a caricare, procedi comunque dopo 3.5 secondi
            setTimeout(() => { if(isProcessing && document.getElementById('card-front').classList.contains('hidden')) imgPreload.onload(); }, 3500);
        }

        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.onreading = () => { if (!isProcessing) estrai(); };
                } catch (error) { console.log("NFC Error: " + error); }
            }
        }

        function confermaReset() { document.getElementById('custom-modal').classList.remove('hidden'); }
        function chiudiModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        function eseguiReset() { localStorage.removeItem('mazzoNFC'); location.reload(); }
    </script>
</body>
</html>
