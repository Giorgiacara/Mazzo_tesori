<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazzo NFC Interattivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f4f4;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Almendra', serif; 
            background-image: url('https://as1.ftcdn.net/v2/jpg/09/73/57/52/1000_F_973575228_DO8x9FCFBaZpL1aXbZe13M7tvDEysStU.jpg');
            background-color: #332211;
            background-size: cover;
            background-position: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Pulsanti di Controllo in alto */
        #reset-btn {
            position: absolute;
            top: 20px; right: 20px;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: 1px solid var(--gold);
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.9rem;
        }

        #back-btn {
            position: absolute;
            top: 20px; left: 20px;
            padding: 10px 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.9rem;
            font-weight: bold;
            display: none; /* Appare solo con la carta */
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); 
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #game-container {
            width: 90vw;
            max-width: 600px;
            position: relative;
            display: none;
        }

        .card-display {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
            color: #2c3e50;
        }

        .card-img {
            width: 100%;
            max-height: 50vh;
            object-fit: contain;
            border-radius: 10px;
        }

        #scanning-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; justify-content: center; align-items: center;
            border-radius: 15px;
            z-index: 10;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: #f4e7d3;
            padding: 30px;
            border-radius: 10px;
            border: 3px solid var(--gold);
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="audio-player" preload="auto"></audio>

    <!-- Schermata Iniziale -->
    <div id="start-screen">
        <h1>Nuovi tesori ti aspettano</h1>
        <button onclick="iniziaAvventura()" style="padding:20px 40px; font-size:1.4rem; cursor:pointer; background: #c0392b; color:white; border:none; border-radius:50px;">INIZIA A CERCARE</button>
    </div>

    <!-- Pulsanti di controllo (Sempre accessibili dopo lo start) -->
    <button id="reset-btn" class="hidden" onclick="confermaReset()">Ripristina Tesori</button>
    <button id="back-btn" onclick="tornaAlMazzo()">Ricerca Conclusa</button>

    <!-- Contenitore Gioco -->
    <div id="game-container">
        
        <!-- Retro del Mazzo -->
        <div id="deck-back" class="card-display" onclick="estrai()">
            <img src="https://hqtoolkit.altervista.org/images/tesori/HQ21/HQ21_back.png" alt="Retro Mazzo" class="card-img">
            <p style="font-size: 1.2rem;">Avvicinati al forziere per cercare tesori</p>
        </div>

        <!-- Overlay di Scansione -->
        <div id="scanning-overlay" class="hidden">
            <p style="font-size: 1.8rem; font-weight: bold;">In cerca di tesori...</p>
        </div>

        <!-- Fronte della Carta -->
        <div id="card-front" class="card-display hidden">
            <h2 id="card-name">Nome Carta</h2>
            <img id="card-image" src="" alt="Immagine Carta" class="card-img">
            <p id="card-desc">Descrizione</p>
        </div>
    </div>

    <!-- Modal di Reset -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Reset del Mazzo</h2>
            <p>Vuoi rimettere tutti i tesori nel forziere?</p>
            <button onclick="chiudiModal()">ANNULLA</button>
            <button onclick="eseguiReset()" style="background:#c0392b; color:white;">RIPRISTINA</button>
        </div>
    </div>

    <script>
        // Database (accorciato per brevità, tieni pure il tuo completo)
        const DATABASE_INIZIALE = [
            {id: 1, nome: "Pozione Risanante", tipo: "Tesori", desc: "Recupera 1 dado rosso di Punti Corpo.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c4/Potion_healing.jpg", suono: "Pozione.mp3"},
            {id: 15, nome: "Mostro Errante", tipo: "Danni", desc: "Un mostro ti attacca subito!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg", suono: "Mostro.mp3"}
            // ... aggiungi qui tutti gli altri ...
        ];

        let mazzoAttivo = [];
        let isProcessing = false;
        let timeoutCarta = null;

        function iniziaAvventura() {
            document.getElementById('audio-player').play().catch(() => {});
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('reset-btn').classList.remove('hidden');
            
            const salvataggio = localStorage.getItem('mazzoNFC');
            mazzoAttivo = salvataggio ? JSON.parse(salvataggio) : [...DATABASE_INIZIALE];
            startNFC();
        }

        function tornaAlMazzo() {
            if (timeoutCarta) clearTimeout(timeoutCarta);
            document.getElementById('card-front').classList.add('hidden');
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('deck-back').classList.remove('hidden');
            isProcessing = false;
        }

        function estrai() {
            if (isProcessing || mazzoAttivo.length === 0) return;
            isProcessing = true;
            if (timeoutCarta) clearTimeout(timeoutCarta);

            document.getElementById('scanning-overlay').classList.remove('hidden');

            const indice = Math.floor(Math.random() * mazzoAttivo.length);
            const carta = mazzoAttivo[indice];

            const imgPreload = new Image();
            imgPreload.src = carta.img;

            imgPreload.onload = imgPreload.onerror = function() {
                setTimeout(() => {
                    document.getElementById('card-name').innerText = carta.nome;
                    document.getElementById('card-image').src = carta.img;
                    document.getElementById('card-desc').innerHTML = carta.desc;

                    const player = document.getElementById('audio-player');
                    if (carta.suono) {
                        player.src = carta.suono;
                        player.play().catch(e => console.log("Audio Error:", e));
                    }

                    document.getElementById('card-front').classList.remove('hidden');
                    document.getElementById('back-btn').style.display = 'block';
                    document.getElementById('scanning-overlay').classList.add('hidden');
                    document.getElementById('deck-back').classList.add('hidden');

                    if (carta.tipo === "Tesori") {
                        mazzoAttivo.splice(indice, 1);
                        localStorage.setItem('mazzoNFC', JSON.stringify(mazzoAttivo));
                    }

                    timeoutCarta = setTimeout(tornaAlMazzo, 25000); 
                }, 2000); // Ridotto a 2 secondi per fluidità
            };
        }

        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.onreading = () => { if (!isProcessing) estrai(); };
                } catch (error) { console.log("NFC Error: " + error); }
            }
        }

        function confermaReset() { document.getElementById('custom-modal').classList.remove('hidden'); }
        function chiudiModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        function eseguiReset() { localStorage.removeItem('mazzoNFC'); location.reload(); }
    </script>
</body>
</html>
