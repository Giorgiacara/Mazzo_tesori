<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazzo NFC Interattivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f4f4;
        }

        body {
            /* 2. Applico Almendra a tutto il corpo del sito */
            font-family: 'Almendra', serif; 
            background-image: url('https://as1.ftcdn.net/v2/jpg/09/73/57/52/1000_F_973575228_DO8x9FCFBaZpL1aXbZe13M7tvDEysStU.jpg');
            background-color: #332211;
            background-size: cover;
            background-position: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Forza il font su tutti gli elementi interattivi */
        button, p, h1, h2, h3, .status-msg {
            font-family: 'Almendra', serif;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #start-screen h1 {
            color: #f1c40f;
            font-size: 2.5rem;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        #game-container {
            width: 90vw;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            perspective: 1000px;
            display: none;
        }

        #reset-btn {
            position: absolute;
            top: 20px; right: 20px;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.9rem;
        }

        .card-display {
            width: 100%;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            color: #2c3e50;
        }

        .card-img {
            width: 100%;
            height: auto;
            max-height: 55vh;
            display: block;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .status-msg {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: bold;
        }

        .hidden { display: none !important; }

        #scanning-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; justify-content: center; align-items: center;
            border-radius: 15px;
            z-index: 10;
        }

        #card-name {
            margin: 0 0 5px 0;
            font-size: 2rem;
            color: #c0392b;
        }

        #card-desc {
            font-size: 1.2rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Nuovi tesori ti aspettano</h1>
        <p style="margin-bottom: 30px; font-size: 1.3rem;">Pronto per l'avventura?</p>
        <button id="start-btn" onclick="iniziaAvventura()" style="padding:20px 40px; font-size:1.4rem; font-weight:bold; cursor:pointer; background:#e74c3c; color:white; border:none; border-radius:50px; box-shadow: 0 0 20px rgba(231,76,60,0.5); font-family: 'Almendra', serif;">INIZIA A CERCARE</button>
    </div>

    <button id="reset-btn" onclick="confermaReset()">Ripristina Tesori</button>

    <div id="game-container">
        <div id="deck-back" class="card-display" onclick="estrai()">
            <img src="https://hqtoolkit.altervista.org/images/tesori/HQ21/HQ21_back.png" alt="Retro Mazzo" class="card-img">
            <p style="font-size: 1.2rem;">Avvicinati al forziere per cercare tesori</p>
        </div>

        <div id="scanning-overlay" class="hidden">
            <p class="status-msg">In cerca di tesori...</p>
        </div>

        <div id="card-front" class="card-display hidden">
            <h2 id="card-name">Nome Carta</h2>
            <img id="card-image" src="" alt="Immagine Carta" class="card-img">
            <p id="card-desc">Descrizione della carta estratta.</p>
        </div>
    </div>

    <script>
        const DATABASE_INIZIALE = [
            {id: 1, nome: "Pozione Risanante", tipo: "Tesori", desc: "Recupera punti corpo pari a un dado.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c4/Potion_healing.jpg/revision/latest?cb=20090514123902"},
            {id: 4, nome: "Heroic Brew", tipo: "Tesori", desc: "Puoi fare due attacchi invece di uno.", img: "https://static.wikia.nocookie.net/heroquest/images/9/92/Potion_heroic.jpg/revision/latest?cb=20090514125219"},
            {id: 7, nome: "Gemme!", tipo: "Tesori", desc: "Trovi una gemma da 35 monete d'oro.", img: "https://static.wikia.nocookie.net/heroquest/images/8/81/Treasure_gem.jpg/revision/latest?cb=20090514125416"},
            {id: 15, nome: "Mostro Errante", tipo: "Danni", desc: "Un mostro ti attacca immediatamente!", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541"},
            {id: 21, nome: "Trappola", tipo: "Danni", desc: "Una freccia ti colpisce: perdi 1 punto corpo.", img: "https://static.wikia.nocookie.net/heroquest/images/9/91/Hazard_spear.jpg/revision/latest?cb=20090514123733"}
        ];

        let mazzoAttivo = [];
        let isProcessing = false;

        function iniziaAvventura() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            const salvataggio = localStorage.getItem('mazzoNFC');
            mazzoAttivo = salvataggio ? JSON.parse(salvataggio) : [...DATABASE_INIZIALE];
            
            startNFC();
        }

        function estrai() {
            if (isProcessing || mazzoAttivo.length === 0) return;
            
            isProcessing = true;
            document.getElementById('scanning-overlay').classList.remove('hidden');

            setTimeout(() => {
                document.getElementById('scanning-overlay').classList.add('hidden');
                document.getElementById('deck-back').classList.add('hidden');
                
                const indice = Math.floor(Math.random() * mazzoAttivo.length);
                const carta = mazzoAttivo[indice];

                document.getElementById('card-name').innerText = carta.nome;
                document.getElementById('card-image').src = carta.img;
                document.getElementById('card-desc').innerText = carta.desc;
                document.getElementById('card-front').classList.remove('hidden');

                if (carta.tipo === "Tesori") {
                    mazzoAttivo.splice(indice, 1);
                    localStorage.setItem('mazzoNFC', JSON.stringify(mazzoAttivo));
                }

                setTimeout(() => {
                    document.getElementById('card-front').classList.add('hidden');
                    document.getElementById('deck-back').classList.remove('hidden');
                    isProcessing = false;
                }, 10000);

            }, 3000);
        }

        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.onreading = () => {
                        if (!isProcessing) estrai();
                    };
                } catch (error) {
                    console.log("NFC Error: " + error);
                }
            }
        }

        function confermaReset() {
            if (confirm("Ripristinare il mazzo?")) {
                localStorage.removeItem('mazzoNFC');
                location.reload();
            }
        }
    </script>
</body>
</html>
