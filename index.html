<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazzo NFC Interattivo</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Sostituisci l'URL con l'immagine che preferisci */
    background-image: url('https://scontent.fblq1-1.fna.fbcdn.net/v/t39.30808-6/652374100_10237393934422300_8095852678585826194_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=100&ccb=1-7&_nc_sid=e06c5d&_nc_ohc=39WOCzAzVDMQ7kNvwGVxElR&_nc_oc=Adp0LZ221tEGdyTRMES5oAbgKOri9ZDCSv303MgeLw8YGI0ynBqUpbO4Ff0E9PLc65c&_nc_zt=23&_nc_ht=scontent.fblq1-1.fna&_nc_gid=b5zrKU8Gp5IPYUplEAiqtw&_nc_ss=7b2a8&oh=00_Af11GLPwYPuk9aONornHvnWfZ7BUEPcVvtAs9QvCCg88Yw&oe=69F567EB');
    background-color: #332211; /* Colore di riserva */
    background-size: cover; /* Copre tutto lo schermo */
    background-position: center;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
        }

        /* Pulsante Reset in alto a destra */
        #reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
        }

        /* Contenitore Mazzo */
        /* 1. Il contenitore ora ha una larghezza fissa, l'altezza è automatica */
        #game-container {
            width: 90vw;           /* Occupa quasi tutta la larghezza dello schermo */
            max-width: 600px;      /* Limite massimo per schermi grandi */
            margin: 0 auto;        /* Centra tutto */
            position: relative;
            perspective: 1000px;
        }
        
        /* 2. Le card-display devono adattarsi al contenuto */
        .card-display {
            width: 100%;
            min-height: 200px;     /* Altezza minima per non collassare */
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }
        
        /* 3. L'immagine comanda la dimensione: larghezza 100%, altezza libera */
        .card-img {
            width: 100%;           /* Tutte le immagini saranno larghe quanto il contenitore */
            height: auto;          /* L'altezza si adatta proporzionalmente (verticale o orizzontale) */
            display: block;
            object-fit: contain;
            margin-bottom: 15px;
            background: transparent;
            border-radius: 10px;
        }

        .status-msg {
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: bold;
        }

        /* Nascondi elementi */
        .hidden { display: none !important; }

        /* Overlay di scansione */
        #scanning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <button id="reset-btn" onclick="confermaReset()">Ripristina Tesori</button>

    <div id="game-container">
        <div id="deck-back" class="card-display">
            <img src="https://hqtoolkit.altervista.org/images/tesori/HQ21/HQ21_back.png" alt="Retro Mazzo" class="card-img">
            <p>Avvicinati al forziere per cercare tesori</p>
        </div>

        <div id="scanning-overlay" class="hidden">
            <p class="status-msg">In cerca di tesori...</p>
        </div>

        <div id="card-front" class="card-display hidden">
            <h2 id="card-name">Nome Carta</h2>
            <img id="card-image" src="" alt="Immagine Carta" class="card-img">
            <p id="card-desc">Descrizione della carta estratta.</p>
        </div>
    </div>

            {id: 24, nome: "Hazard!", tipo: "Danni", desc: "Suddenly, the stone beneath your feet gives way. You fall into a shallow hole, losing 1 Body Point and ending your turn. You may climb out and move normally on your next turn.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c5/Hazard_pit.jpg/revision/latest?cb=20090514123652"}
        ];

        let mazzoAttivo = [];
    let isProcessing = false;

    function init() {
        const salvataggio = localStorage.getItem('mazzoNFC');
        mazzoAttivo = salvataggio ? JSON.parse(salvataggio) : [...DATABASE_INIZIALE];
        
        // ABILITA SEMPRE IL CLICK (Sia su PC che su Mobile)
        document.getElementById('deck-back').addEventListener('click', () => {
            console.log("Click rilevato");
            estrai();
        });

        // Prova ad avviare l'NFC al primo tocco dello schermo
        document.body.addEventListener('click', () => {
            startNFC();
        }, { once: true });
    }

    function estrai() {
        if (isProcessing) return;
        if (mazzoAttivo.length === 0) {
            alert("Tesori esauriti!");
            return;
        }
        
        isProcessing = true;
        document.getElementById('scanning-overlay').classList.remove('hidden');

        setTimeout(() => {
            document.getElementById('scanning-overlay').classList.add('hidden');
            document.getElementById('deck-back').classList.add('hidden');
            
            const indice = Math.floor(Math.random() * mazzoAttivo.length);
            const carta = mazzoAttivo[indice];

            document.getElementById('card-name').innerText = carta.nome;
            document.getElementById('card-image').src = carta.img;
            document.getElementById('card-desc').innerText = carta.desc;
            document.getElementById('card-front').classList.remove('hidden');

            if (carta.tipo === "Tesori") {
                mazzoAttivo.splice(indice, 1);
                localStorage.setItem('mazzoNFC', JSON.stringify(mazzoAttivo));
            }

            setTimeout(() => {
                document.getElementById('card-front').classList.add('hidden');
                document.getElementById('deck-back').classList.remove('hidden');
                isProcessing = false;
            }, 10000); /*mostra la carta tesoro per 10 secondi*/

        }, 3000);/*mostra ricerca tesoro per 3 secondi*/
    }

    function confermaReset() {
        if (confirm("Vuoi davvero ripristinare tutti i tesori originali?")) {
            mazzoAttivo = [...DATABASE_INIZIALE];
            localStorage.setItem('mazzoNFC', JSON.stringify(mazzoAttivo));
            location.reload();
        }
    }

    async function startNFC() {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                console.log("NFC Scansione avviata");
                ndef.onreading = () => {
                    if (!isProcessing) estrai();
                };
            } catch (error) {
                console.log("Errore NFC: " + error);
            }
        }
    }

    window.onload = init;
    </script>
</body>
</html>
