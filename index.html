<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazzo NFC Interattivo</title>


    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f4f4;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Almendra', serif; 
            background-image: url('https://as1.ftcdn.net/v2/jpg/09/73/57/52/1000_F_973575228_DO8x9FCFBaZpL1aXbZe13M7tvDEysStU.jpg');
            background-color: #332211;
            background-size: cover;
            background-position: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        button, p, h1, h2, h3, .status-msg {
            font-family: 'Almendra', serif;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #start-screen h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        #game-container {
            width: 90vw;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            perspective: 1000px;
            display: none;
        }

        #reset-btn {
            position: absolute;
            top: 20px; right: 20px;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.9rem;
        }

        .card-display {
            width: 100%;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            color: #2c3e50;
            backface-visibility: hidden;
            -webkit-perspective: 1000;
        }

        .card-img {
            width: 100%;
            height: auto;
            max-height: 55vh;
            display: block;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .status-msg {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: bold;
        }

        .hidden { display: none !important; }

        #scanning-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; justify-content: center; align-items: center;
            border-radius: 15px;
            z-index: 10;
        }

        #card-name {
            margin: 0 0 5px 0;
            font-size: 2rem;
            color: #c0392b;
        }

        #card-desc {
            font-size: 1.2rem;
            margin-top: 5px;
        }

        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            background: #c0392b;        /*Attualmente Rosso come i titoli - - #27ae60;  Verde per indicare azione conclusa */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.9rem;
            /*font-weight: bold;*/
            transition: background 0.3s;
            display: none; /* Nascosto di default */
        }

        #back-btn:hover {
            background: #2ecc71;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: #f4e7d3;
            padding: 30px;
            border-radius: 10px;
            border: 3px solid var(--gold);
            max-width: 85%;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            color: #332211;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .modal-buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-annulla { background: #95a5a6; color: white; }
        .btn-conferma { background: #c0392b; color: white; }

    </style>
</head>
<body>

    <audio id="audio-player" preload="auto"></audio>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Reset del Mazzo</h2>
            <p>Sei sicuro di voler rimettere tutti i tesori nel forziere e ricominciare?</p>
            <div class="modal-buttons">
                <button onclick="chiudiModal()" class="btn-annulla">ANNULLA</button>
                <button onclick="eseguiReset()" class="btn-conferma">RIPRISTINA</button>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <h1>Nuovi tesori ti aspettano</h1>
        <p style="margin-bottom: 30px; font-size: 1.3rem;">Pronto per l'avventura?</p>
        <button id="start-btn" onclick="iniziaAvventura()" style="padding:20px 40px; font-size:1.4rem; font-weight:bold; cursor:pointer; background: #c0392b; color:white; border:none; border-radius:50px;">INIZIA A CERCARE</button>
    </div>

    <button id="reset-btn" onclick="confermaReset()">Ripristina Tesori</button>
    <button id="back-btn" onclick="tornaAlMazzo()">Ricerca Conclusa</button>

    <div id="game-container">
        <div id="deck-back" class="card-display" onclick="estrai()">
            <img src="https://hqtoolkit.altervista.org/images/tesori/HQ21/HQ21_back.png" alt="Retro Mazzo" class="card-img">
            <p style="font-size: 1.2rem;">Avvicinati al forziere per cercare tesori</p>
        </div>

        <div id="scanning-overlay" class="hidden">
            <p class="status-msg">In cerca di tesori...</p>
        </div>

        <div id="card-front" class="card-display hidden">
            <h2 id="card-name">Nome Carta</h2>
            <img id="card-image" src="" alt="Immagine Carta" class="card-img">
            <p id="card-desc">Descrizione della carta estratta.</p>
        </div>
    </div>

            {id: 4, nome: "Infuso Eroico", tipo: "Tesori", desc: "Trovate una sacca di pelle che pende da un muro. Se bevete la pozione al suo interno prima di un attacco, potete <b>fare 2 attacchi invece di 1</b>. Potete usarla solo una volta. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/9/92/Potion_heroic.jpg/revision/latest?cb=20090514125219", suono: "Pozione.mp3"},

            {id: 9, nome: "Oro!", tipo: "Tesori", desc: "Tra un mucchio di cianfrusaglie, vecchi cenci e bisunte coperte trovate <b>15 monete d'oro</b>. Riportate la cifra sulla vostra scheda personaggio. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457", suono: "Monete.mp3"},
            {id: 10, nome: "Oro!", tipo: "Tesori", desc: "Tra un mucchio di cianfrusaglie, vecchi cenci e bisunte coperte trovate <b>15 monete d'oro</b>. Riportate la cifra sulla vostra scheda personaggio. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457", suono: "Monete.mp3"},
            {id: 11, nome: "Oro!", tipo: "Tesori", desc: "Trovate un mattone traballante e lo sfilate dal muro. Dietro di esso, scoprite un piccolo borsellino di cuoio avvolto in un vecchio straccio. Sbirciate all'interno e trovate <b>25 monete d'oro</b>. Riportate la cifra sulla vostra scheda personaggio. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457", suono: "Monete.mp3"},
            {id: 12, nome: "Oro!", tipo: "Tesori", desc: "Trovate un mattone traballante e lo sfilate dal muro. Dietro di esso, scoprite un piccolo borsellino di cuoio avvolto in un vecchio straccio. Sbirciate all'interno e trovate <b>25 monete d'oro</b>. Riportate la cifra sulla vostra scheda personaggio. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/3/30/Treasure_gold.jpg/revision/latest?cb=20090514125457", suono: "Monete.mp3"},
            {id: 13, nome: "Gioielli!", tipo: "Tesori", desc: "Avete trovato una scatola di legno dall'aspetto semplice e antico. Scoprite che all'interno è foderata di raso e contiene minuscoli gioielli dal valore di <b>50 monete d'oro</b>. Riportate la cifra sulla vostra scheda personaggio. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/1/1d/Treasure_jewel.jpg/revision/latest?cb=20090514125520", suono: "Monete.mp3"},
            {id: 14, nome: "Gioielli!", tipo: "Tesori", desc: "Avete trovato una scatola di legno dall'aspetto semplice e antico. Scoprite che all'interno è foderata di raso e contiene minuscoli gioielli dal valore di <b>50 monete d'oro</b>. Riportate la cifra sulla vostra scheda personaggio. La carta va scartata dopo l'uso.", img: "https://static.wikia.nocookie.net/heroquest/images/1/1d/Treasure_jewel.jpg/revision/latest?cb=20090514125520", suono: "Monete.mp3"},
            {id: 15, nome: "Mostro Errante", tipo: "Danni", desc: "Mentre state cercando qualcosa, un mostro vi sorprende furtivamente e vi attacca! Zargon dovrà mettere il mostro errante in una casella qualsiasi a voi adiacente. Il mostro vi attaccherà subito. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541", suono: "Mostro.mp3"},
            {id: 16, nome: "Mostro Errante", tipo: "Danni", desc: "Mentre state cercando qualcosa, un mostro vi sorprende furtivamente e vi attacca! Zargon dovrà mettere il mostro errante in una casella qualsiasi a voi adiacente. Il mostro vi attaccherà subito. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541", suono: "Mostro.mp3"},
            {id: 17, nome: "Mostro Errante", tipo: "Danni", desc: "Mentre state cercando qualcosa, un mostro vi sorprende furtivamente e vi attacca! Zargon dovrà mettere il mostro errante in una casella qualsiasi a voi adiacente. Il mostro vi attaccherà subito. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541", suono: "Mostro.mp3"},
            {id: 18, nome: "Mostro Errante", tipo: "Danni", desc: "Mentre state cercando qualcosa, un mostro vi sorprende furtivamente e vi attacca! Zargon dovrà mettere il mostro errante in una casella qualsiasi a voi adiacente. Il mostro vi attaccherà subito. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541", suono: "Mostro.mp3"},
            {id: 19, nome: "Mostro Errante", tipo: "Danni", desc: "Mentre state cercando qualcosa, un mostro vi sorprende furtivamente e vi attacca! Zargon dovrà mettere il mostro errante in una casella qualsiasi a voi adiacente. Il mostro vi attaccherà subito. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541", suono: "Mostro.mp3"},
            {id: 20, nome: "Mostro Errante", tipo: "Danni", desc: "Mentre state cercando qualcosa, un mostro vi sorprende furtivamente e vi attacca! Zargon dovrà mettere il mostro errante in una casella qualsiasi a voi adiacente. Il mostro vi attaccherà subito. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/e/ec/Wandering_monster.jpg/revision/latest?cb=20090514125541", suono: "Mostro.mp3"},
            {id: 21, nome: "Trabocchetto!", tipo: "Danni", desc: "State cercando qualcosa quando un dardo nascosto nel muro vi si staglia contro. <b>Perdete 1 Punto Corpo</b> e il vostro turno termina qui. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/9/91/Hazard_spear.jpg/revision/latest?cb=20090514123733", suono: "Freccia.mp3"},
            {id: 22, nome: "Trabocchetto!", tipo: "Danni", desc: "State cercando qualcosa quando un dardo nascosto nel muro vi si staglia contro. <b>Perdete 1 Punto Corpo</b> e il vostro turno termina qui. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/9/91/Hazard_spear.jpg/revision/latest?cb=20090514123733", suono: "Freccia.mp3"},
            {id: 23, nome: "Trabocchetto!", tipo: "Danni", desc: "All'improvviso la pietra che avete sotto i piedi comincia a spostarsi. Cascate in una buca profonda, <b>perdendo 1 Punto Corpo</b>. Il vostro turno termina qui, ma al vostro turno successivo potrete venirne fuori e ricominciare a giocare normalmente. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c5/Hazard_pit.jpg/revision/latest?cb=20090514123652", suono: "Botola.mp3"},
            {id: 24, nome: "Trabocchetto!", tipo: "Danni", desc: "All'improvviso la pietra che avete sotto i piedi comincia a spostarsi. Cascate in una buca profonda, <b>perdendo 1 Punto Corpo</b>. Il vostro turno termina qui, ma al vostro turno successivo potrete venirne fuori e ricominciare a giocare normalmente. Rimettete questa carta in fondo al mazzo.", img: "https://static.wikia.nocookie.net/heroquest/images/c/c5/Hazard_pit.jpg/revision/latest?cb=20090514123652", suono: "Botola.mp3"}
        ];

        let mazzoAttivo = [];
        let isProcessing = false;
        let timeoutCarta = null; // Gestisce il timer dei 25 secondi

        function iniziaAvventura() {
            // Sblocca l'audio per i browser (fondamentale!)
            document.getElementById('audio-player').play().catch(() => {});
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            const salvataggio = localStorage.getItem('mazzoNFC');
            mazzoAttivo = salvataggio ? JSON.parse(salvataggio) : [...DATABASE_INIZIALE];
            startNFC();
        }

        function tornaAlMazzo() {
            if (timeoutCarta) {
                clearTimeout(timeoutCarta);
                timeoutCarta = null;
            }
            document.getElementById('card-front').classList.add('hidden');
            document.getElementById('back-btn').style.display = 'none'; // Nascondi pulsante
            document.getElementById('deck-back').classList.remove('hidden');
            isProcessing = false;
        }

        function estrai() {
            if (isProcessing || mazzoAttivo.length === 0) return;
            isProcessing = true;
            
            // Pulizia di sicurezza nel caso ci fosse un timer vecchio
            if (timeoutCarta) clearTimeout(timeoutCarta);

            document.getElementById('scanning-overlay').classList.remove('hidden');

            const indice = Math.floor(Math.random() * mazzoAttivo.length);
            const carta = mazzoAttivo[indice];

            const imgPreload = new Image();
            imgPreload.src = carta.img;

            imgPreload.onload = imgPreload.onerror = function() {
                setTimeout(() => {
                    document.getElementById('card-name').innerText = carta.nome;
                    document.getElementById('card-image').src = carta.img;
                    document.getElementById('card-desc').innerHTML = carta.desc;

                    

                    const player = document.getElementById('audio-player');
                    if (carta.suono) {
                        player.src = carta.suono;
                        player.play().catch(e => console.log("Audio Error:", e));
                    }

                    document.getElementById('card-front').classList.remove('hidden');
                    document.getElementById('back-btn').style.display = 'block'; // Mostra pulsante
                    document.getElementById('scanning-overlay').classList.add('hidden');
                    document.getElementById('deck-back').classList.add('hidden');

                    if (carta.tipo === "Tesori") {
                        mazzoAttivo.splice(indice, 1);
                        localStorage.setItem('mazzoNFC', JSON.stringify(mazzoAttivo));
                    }

                    // Fai partire il timer da 25 secondi
                    timeoutCarta = setTimeout(() => {
                        tornaAlMazzo();
                    }, 25000); 
                }, 3000);
            };
        }

        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.onreading = () => { if (!isProcessing) estrai(); };
                } catch (error) { console.log("NFC Error: " + error); }
            }
        }

        function confermaReset() { document.getElementById('custom-modal').classList.remove('hidden'); }
        function chiudiModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        function eseguiReset() { localStorage.removeItem('mazzoNFC'); location.reload(); }
    </script>
</body>
</html>
